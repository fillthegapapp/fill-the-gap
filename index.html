<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="#top" aria-label="Fill the Gap home">
        <img class="brand-logo" src="assets/fill_the_gap_logo-modified copy.png" alt="Fill the Gap logo" />
        <div class="brand-copy">
          <small>iOS app</small>

      <nav class="nav-links" aria-label="Primary">
        <a href="#features">Features</a>

      </nav>
    </div>
  </header>

  <main id="top">
    <section class="hero">
      <div class="wrap hero-grid">
        <div class="hero-copy">
          <div class="eyebrow">For the 5–30 minute pockets you usually lose</div>
          <h1>Use the minutes you usually waste.</h1>
          <p>
            Fill the Gap helps you turn bored, scattered downtime into better options based on how much time you have,
            how you feel, and what kind of reset you actually need.
          </p>

          <div class="cta-row" id="download">

        </div>

            <div class="feature-kicker">Step 1</div>

              Choose the time you have right now, whether it is five minutes before leaving or twenty minutes on the couch.
            </p>
          </article>

          <article class="feature-card">
            <div class="feature-kicker">Step 2</div>
            <h3>Match your mood</h3>
            <p>
              Tell the app how you feel so the suggestions fit the moment instead of throwing random tasks at you.
            </p>
          </article>

          <article class="feature-card">
            <div class="feature-kicker">Step 3</div>

            <p>

            </p>
          </article>
